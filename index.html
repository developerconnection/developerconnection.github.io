<!DOCTYPE html>
<!--
  HTML TUTORIAL - BASIC SYNTAX GUIDE
  
  DOCUMENT STRUCTURE:
  - <!DOCTYPE html>        Declares this is an HTML5 document
  - <html>                 Root element, wraps entire page
  - <head>                 Contains metadata (title, styles, scripts)
  - <body>                 Contains visible page content
  
  COMMON TAGS:
  
  TEXT & HEADINGS:
  - <h1> to <h6>          Headings (h1 is largest, h6 is smallest)
  - <p>                    Paragraph
  - <strong>               Bold text (important)
  - <em>                   Italic text (emphasis)
  - <br>                   Line break (self-closing)
  - <hr>                   Horizontal line (self-closing)
  
  LISTS:
  - <ul>                   Unordered list (bullets)
    <li>                   List item (inside ul or ol)
  - <ol>                   Ordered list (numbered)
  
  LINKS & MEDIA:
  - <a href="url">         Hyperlink (anchor tag)
  - <img src="file" alt=""> Image (self-closing)
  - <video src=""></video> Video player
  - <audio src=""></audio> Audio player
  
  CONTAINERS:
  - <div>                  Generic block container
  - <span>                 Generic inline container
  - <section>              Thematic grouping
  - <article>              Independent content
  - <header>               Introductory content / navigation
  - <footer>               Footer content
  - <nav>                  Navigation links
  - <main>                 Main content area
  
  FORMS:
  - <form>                 Form container
  - <input>                Input field (text, email, password, etc.)
  - <button>               Clickable button
  - <label>                Label for input fields
  - <textarea>             Multi-line text input
  - <select>               Dropdown menu
  
  TABLE:
  - <table>                Table container
  - <tr>                   Table row
  - <td>                   Table data cell
  - <th>                   Table header cell
  
  ATTRIBUTES (used in tags):
  - class="name"           CSS class (can have multiple: class="one two")
  - id="unique"            Unique identifier
  - href="url"             Link destination
  - src="file"             Image/media source
  - alt="text"             Alternative text for images
  - placeholder="text"     Hint text in inputs
  - disabled               Disables an input
  - required               Makes input required
  
  BASIC SYNTAX RULES:
  - Opening tag: <tagname>
  - Closing tag: </tagname>
  - Self-closing tags: <br>, <img>, <input>, <hr> (no closing tag needed)
  - Attributes go inside opening tag: <a href="url" class="link">
  - Nest tags properly: <div><p>Text</p></div> (not <div><p>Text</div></p>)
  - Use lowercase for tag names (standard practice)
  - Always quote attribute values: class="name" (not class=name)
  
  EXAMPLE:
  <div class="container">
    <h1>My Page</h1>
    <p>This is a paragraph with <strong>bold</strong> text.</p>
    <a href="https://example.com">Click here</a>
    <img src="image.jpg" alt="Description">
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
    </ul>
  </div>
-->
<html lang="en"> 
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developerconnection Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <img src="./Assets/images/HEADLESSmodelPortfolioImage.png" alt="Headless Model" class="mx-auto my-12 w-48">

    I got experience with 3D modelling.
    Basic Lua scripting and programming knowledge.
    Video editing experience also.
  </body>
</html>
